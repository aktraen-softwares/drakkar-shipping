{% extends "base.html" %}
{% block title %}Client Login &mdash; Drakkar Shipping{% endblock %}

{% block content %}
<section class="page-header">
    <div class="container">
        <h1>Client Portal</h1>
        <p>Log in to manage your shipments and account.</p>
    </div>
</section>

<section class="content-section">
    <div class="container">
        <div class="login-container">
            <form method="POST" action="/login" class="login-form">
                <h2>Sign In</h2>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
                <p class="login-help">Forgot your credentials? Contact <a href="mailto:support@drakkar-shipping.com">support@drakkar-shipping.com</a></p>
            </form>
        </div>
    </div>
</section>
{% endblock %}
